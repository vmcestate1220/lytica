<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 400"
     font-family="Helvetica, Arial, sans-serif">

  <title>Project Lytica — hero banner</title>
  <desc>Horizontal hero banner. NH3 (ammonia, trigonal pyramidal) is the
  input on the left; the decameric Lytica-1 catalyst occupies the centre;
  the peptide amide linkage -C(=O)-N(H)- is the output on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a1626"/>
      <stop offset="45%" stop-color="#132a46"/>
      <stop offset="55%" stop-color="#143049"/>
      <stop offset="100%" stop-color="#1c4a4a"/>
    </linearGradient>

    <radialGradient id="core-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#ffc88a" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#ffc88a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffc88a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sub" cx="32%" cy="28%" r="78%">
      <stop offset="0%"   stop-color="#ffb9a8"/>
      <stop offset="55%"  stop-color="#d94a4a"/>
      <stop offset="100%" stop-color="#5e1414"/>
    </radialGradient>

    <marker id="arr-in" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5fd18a"/>
    </marker>
    <marker id="arr-out" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0c14a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- Subtle horizon line -->
  <line x1="0" y1="260" x2="1600" y2="260"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ===================================================
       LEFT: NH3 (ammonia) structural formula + label
       Pyramidal with three N-H bonds, rendered as Lewis
       skeletal form.
       =================================================== -->
  <g transform="translate(300 200)" stroke-linecap="round">
    <!-- bonds (drawn first so atom glyphs sit on top) -->
    <line x1="0"  y1="-8"  x2="0"   y2="-38" stroke="#e4edf5" stroke-width="2"/>
    <line x1="-7" y1="6"   x2="-34" y2="25"  stroke="#e4edf5" stroke-width="2"/>
    <line x1="7"  y1="6"   x2="34"  y2="25"  stroke="#e4edf5" stroke-width="2"/>

    <!-- atom labels -->
    <text x="0"  y="6"  text-anchor="middle" font-size="26"
          font-weight="700" fill="#9ad7ff">N</text>
    <text x="0"  y="-42" text-anchor="middle" font-size="22"
          font-weight="600" fill="#e4edf5">H</text>
    <text x="-38" y="36" text-anchor="middle" font-size="22"
          font-weight="600" fill="#e4edf5">H</text>
    <text x="38" y="36"  text-anchor="middle" font-size="22"
          font-weight="600" fill="#e4edf5">H</text>

    <!-- retained text label -->
    <text x="0" y="90" text-anchor="middle" font-size="22"
          font-weight="700" fill="#ffffff" letter-spacing="2">
      NH<tspan baseline-shift="sub" font-size="14">3</tspan>
    </text>
  </g>

  <!-- Shortened input arrow -->
  <path d="M 400 200 L 560 200"
        stroke="#5fd18a" stroke-width="3" fill="none"
        marker-end="url(#arr-in)"/>

  <!-- ===================================================
       CENTRE: decameric catalyst core (unchanged)
       =================================================== -->
  <g transform="translate(800 200)">
    <!-- Glow halo -->
    <ellipse cx="0" cy="0" rx="220" ry="110" fill="url(#core-glow)"/>

    <!-- Label above the core -->
    <text x="0" y="-90" text-anchor="middle"
          font-size="12" font-weight="600" letter-spacing="4"
          fill="#ffd9a8">LYTICA-1  ·  DECAMERIC CORE</text>

    <!-- Ring A (top) -->
    <g>
      <circle cx="-120" cy="-28" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="-60"  cy="-28" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="0"    cy="-28" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="60"   cy="-28" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="120"  cy="-28" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
    </g>

    <!-- Ring-ring interface hint -->
    <line x1="-150" y1="4" x2="150" y2="4"
          stroke="#ffffff" stroke-opacity="0.18"
          stroke-width="1" stroke-dasharray="4 4"/>

    <!-- Ring B (bottom) -->
    <g>
      <circle cx="-120" cy="36" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="-60"  cy="36" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="0"    cy="36" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="60"   cy="36" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
      <circle cx="120"  cy="36" r="22" fill="url(#sub)" stroke="#330707" stroke-width="1"/>
    </g>
  </g>

  <!-- Shortened output arrow -->
  <path d="M 1040 200 L 1200 200"
        stroke="#f0c14a" stroke-width="3" fill="none"
        marker-end="url(#arr-out)"/>

  <!-- ===================================================
       RIGHT: peptide amide linkage  -C(=O)-N(H)-  + label
       The amide bond (highlighted gold) is the IUPAC
       representation of peptide-bonded organic nitrogen.
       =================================================== -->
  <g transform="translate(1300 200)" stroke-linecap="round">
    <!-- backbone entry from left (to previous residue's C-alpha) -->
    <line x1="-70" y1="22" x2="-45" y2="6"
          stroke="#e4edf5" stroke-width="2"/>

    <!-- C=O double bond (two parallel lines, carbonyl) -->
    <line x1="-32" y1="-10" x2="-32" y2="-34"
          stroke="#e4edf5" stroke-width="2"/>
    <line x1="-27" y1="-10" x2="-27" y2="-34"
          stroke="#e4edf5" stroke-width="2"/>

    <!-- amide bond C-N: emphasised as THE peptide bond.
         A softer halo line underneath gives a glow; the sharp
         gold line sits on top. -->
    <line x1="-20" y1="0" x2="20" y2="0"
          stroke="#f0c14a" stroke-opacity="0.30"
          stroke-width="10"/>
    <line x1="-18" y1="0" x2="18" y2="0"
          stroke="#f0c14a" stroke-width="3.5"/>

    <!-- N-H bond -->
    <line x1="32" y1="-8" x2="48" y2="-30"
          stroke="#e4edf5" stroke-width="2"/>

    <!-- backbone exit to right (to next residue's C-alpha) -->
    <line x1="45" y1="6" x2="70" y2="22"
          stroke="#e4edf5" stroke-width="2"/>

    <!-- atoms -->
    <text x="-30" y="6" text-anchor="middle" font-size="22"
          font-weight="700" fill="#e4edf5">C</text>
    <text x="-30" y="-38" text-anchor="middle" font-size="22"
          font-weight="700" fill="#ffb098">O</text>
    <text x="30" y="6" text-anchor="middle" font-size="26"
          font-weight="700" fill="#9ad7ff">N</text>
    <text x="54" y="-32" text-anchor="middle" font-size="22"
          font-weight="600" fill="#e4edf5">H</text>

    <!-- alpha-carbon labels at the ends of the backbone whiskers -->
    <text x="-86" y="32" text-anchor="middle" font-size="18"
          font-weight="700" fill="#e4edf5">C<tspan
          baseline-shift="sub" font-size="13" font-weight="600"
          fill="#cfd8e3">&#945;</tspan></text>
    <text x="86" y="32" text-anchor="middle" font-size="18"
          font-weight="700" fill="#e4edf5">C<tspan
          baseline-shift="sub" font-size="13" font-weight="600"
          fill="#cfd8e3">&#945;</tspan></text>

    <!-- "peptide bond" callout: bracket + label beneath C-N -->
    <path d="M -18 22 L -18 28 L 18 28 L 18 22"
          fill="none" stroke="#f0c14a" stroke-width="1.5"
          stroke-linejoin="round"/>
    <text x="0" y="50" text-anchor="middle" font-size="13"
          font-weight="700" letter-spacing="3"
          fill="#f0c14a">PEPTIDE BOND</text>

    <!-- retained text label -->
    <text x="0" y="95" text-anchor="middle" font-size="20"
          font-weight="700" fill="#ffffff" letter-spacing="1">
      Peptide-bonded organic N
    </text>
  </g>
</svg>
